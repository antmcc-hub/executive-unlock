<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Executive Unlock — Leveragentic.AI</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #222633;
    --border: #2a2e3b;
    --text: #e4e4e7;
    --text-muted: #9ca3af;
    --accent: #c49a6c;
    --accent-light: #d4b08c;
    --green: #4ade80;
    --blue: #60a5fa;
    --purple: #a78bfa;
    --voice: #f59e0b;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

  header {
    text-align: center;
    padding: 3rem 0 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2rem;
  }

  header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  header h1 span { color: var(--accent); }
  header p { color: var(--text-muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

  .stage {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 1.5rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .stage:hover { border-color: var(--accent); }

  .stage-header {
    padding: 1.25rem 1.5rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 1rem;
    user-select: none;
  }

  .stage-number {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--accent); color: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.9rem; flex-shrink: 0;
  }

  .stage-title { font-size: 1.15rem; font-weight: 600; flex: 1; }
  .stage-subtitle { font-size: 0.85rem; color: var(--text-muted); }
  .stage-chevron { font-size: 1.2rem; color: var(--text-muted); transition: transform 0.2s; }
  .stage.open .stage-chevron { transform: rotate(90deg); }

  .stage-body { display: none; padding: 0 1.5rem 1.5rem; }
  .stage.open .stage-body { display: block; }

  .stage-intro { color: var(--text-muted); margin-bottom: 1.25rem; font-size: 0.95rem; }

  .prompt-card {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem 1.25rem; margin-bottom: 1rem; position: relative;
  }

  .prompt-label {
    font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.05em; margin-bottom: 0.5rem;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .prompt-label.copy-prompt { color: var(--green); }
  .prompt-label.voice-script { color: var(--voice); }
  .prompt-label.what-happens { color: var(--blue); }
  .prompt-label.tip { color: var(--purple); }
  .prompt-label.table-card { color: var(--accent); }

  .prompt-text {
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; color: var(--text);
  }
  .voice-text { font-style: italic; font-size: 0.95rem; line-height: 1.6; color: var(--text); }
  .outcome-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; }

  .copy-btn {
    position: absolute; top: 0.75rem; right: 0.75rem;
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.75rem;
    cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--surface-hover); color: var(--text); }
  .copy-btn.copied { background: var(--green); color: var(--bg); border-color: var(--green); }

  /* Checkboxes */
  .checkbox-group { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .checkbox-label {
    display: flex; align-items: center; gap: 0.5rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 0.6rem 1rem; cursor: pointer; transition: all 0.15s; font-size: 0.9rem;
  }
  .checkbox-label:hover { border-color: var(--accent); }
  .checkbox-label input { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
  .checkbox-label.checked { border-color: var(--accent); background: var(--surface-hover); }

  /* Table styling */
  .comparison-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 0.5rem; }
  .comparison-table th {
    background: var(--surface-hover); padding: 0.6rem 0.75rem; text-align: left;
    border-bottom: 1px solid var(--border); font-weight: 600; color: var(--accent);
  }
  .comparison-table td {
    padding: 0.5rem 0.75rem; border-bottom: 1px solid var(--border); color: var(--text-muted);
    vertical-align: top;
  }
  .comparison-table tr:hover td { background: var(--surface-hover); }

  /* Break divider */
  .break-divider {
    text-align: center; padding: 2.5rem 1.5rem; margin-bottom: 1.5rem;
    background: linear-gradient(135deg, var(--surface) 0%, #1e2233 100%);
    border: 2px solid var(--accent); border-radius: 12px;
  }
  .break-divider h2 { color: var(--accent); font-size: 1.4rem; margin-bottom: 0.5rem; }
  .break-divider p { color: var(--text-muted); font-size: 0.95rem; max-width: 550px; margin: 0 auto; }

  .progress-bar { display: flex; gap: 4px; margin-bottom: 2rem; padding: 0 0.5rem; }
  .progress-dot { flex: 1; height: 4px; border-radius: 2px; background: var(--border); transition: background 0.3s; }
  .progress-dot.active { background: var(--accent); }
  .progress-dot.break-dot { background: var(--border); border-top: 2px solid var(--accent); }

  footer { text-align: center; padding: 3rem 0 2rem; border-top: 1px solid var(--border); margin-top: 2rem; }
  footer p { color: var(--text-muted); font-size: 0.85rem; }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .container { padding: 1rem; }
    header h1 { font-size: 1.6rem; }
    .stage-header { padding: 1rem; }
    .stage-body { padding: 0 1rem 1rem; }
    .checkbox-group { flex-direction: column; }
  }
</style>
</head>

function renderStage(stage, idx) {
  // Progress dot
  const dot = document.createElement('div');
  dot.className = 'progress-dot';
  dot.dataset.index = idx;
  progressBar.appendChild(dot);

  const el = document.createElement('div');
  el.className = 'stage';
  el.dataset.index = idx;

  let bodyHtml = '';
  if (stage.customRender) {
    bodyHtml = `<div class="stage-intro">${stage.intro}</div><div id="custom-${stage.id}"></div>`;
  } else {
    bodyHtml = `<div class="stage-intro">${stage.intro}</div>` + renderCards(stage.cards);
  }

  el.innerHTML = `
    <div class="stage-header" onclick="toggleStage(${idx})">
      <div class="stage-number">${idx + 1}</div>
      <div>
        <div class="stage-title">${stage.title}</div>
        <div class="stage-subtitle">${stage.subtitle}</div>
      </div>
      <div class="stage-chevron">\u25b6</div>
    </div>
    <div class="stage-body">${bodyHtml}</div>
  `;

  stagesEl.appendChild(el);
  stageElements.push(el);

  // Run custom renderer after DOM insertion
  if (stage.customRender && stage.renderFn) {
    setTimeout(() => window[stage.renderFn](), 0);
  }
}

function renderBreak() {
  const dot = document.createElement('div');
  dot.className = 'progress-dot break-dot';
  progressBar.appendChild(dot);

  const el = document.createElement('div');
  el.className = 'break-divider';
  el.innerHTML = `<h2>${breakPoint.title}</h2><p>${breakPoint.text}</p>`;
  stagesEl.appendChild(el);
}

function renderCards(cards) {
  return cards.map(card => {
    if (card.html) {
      return `<div class="prompt-card">
        <div class="prompt-label ${card.type}">${getIcon(card.type)} ${card.label}</div>
        ${card.html}
      </div>`;
    }

    const isCopiable = card.type === 'copy-prompt' || card.type === 'voice-script';
    const textClass = card.type === 'voice-script' ? 'voice-text' :
                      (card.type === 'what-happens' || card.type === 'tip') ? 'outcome-text' : 'prompt-text';
    const copyBtn = isCopiable ? `<button class="copy-btn" onclick="copyText(this)">Copy</button>` : '';

    return `<div class="prompt-card">
      ${copyBtn}
      <div class="prompt-label ${card.type}">${getIcon(card.type)} ${card.label}</div>
      <div class="${textClass}">${card.text}</div>
    </div>`;
  }).join('');
}

function getIcon(type) {
  switch(type) {
    case 'copy-prompt': return '>';
    case 'voice-script': return '\u{1f3a4}';
    case 'tip': return '\u{1f4a1}';
    case 'what-happens': return '\u{1f441}';
    case 'table-card': return '\u{1f4ca}';
    default: return '>';
  }
}

function toggleStage(index) {
  const stage = document.querySelector(`.stage[data-index="${index}"]`);
  if (!stage) return;
  const wasOpen = stage.classList.contains('open');
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('open'));
  document.querySelectorAll('.progress-dot').forEach(d => d.classList.remove('active'));
  if (!wasOpen) {
    stage.classList.add('open');
    for (let i = 0; i <= index; i++) {
      const d = document.querySelector(`.progress-dot[data-index="${i}"]`);
      if (d) d.classList.add('active');
    }
  }
}

function copyText(btn) {
  const card = btn.closest('.prompt-card');
  const textEl = card.querySelector('.prompt-text, .voice-text');
  if (!textEl) return;
  navigator.clipboard.writeText(textEl.textContent).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  });
}

  if (userEnv.google) tools.push('Google Workspace (including Gemini)');

    ? `I use ${tools.join(' and ')} at work.`
